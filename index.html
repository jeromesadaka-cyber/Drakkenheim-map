<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" id="vpmeta">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Drakkenheim</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:Georgia,serif;touch-action:none}
#container{width:100vw;height:100vh;overflow:hidden;position:relative}
#map-layer{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
#map-img{display:block;-webkit-user-drag:none;user-select:none;pointer-events:none}
.marker{position:absolute;transform:translate(-50%,-50%);z-index:10}
.marker.sel .mshape{outline:3px solid #fff;outline-offset:2px}
.mshape{width:22px;height:22px;border:2.5px solid rgba(0,0,0,0.6);display:block}
.mshape.circle{border-radius:50%}
.mshape.square{border-radius:3px}
.mshape.triangle{width:0;height:0;background:transparent!important;border-left:12px solid transparent;border-right:12px solid transparent;border-bottom-width:22px;border-bottom-style:solid;border-top:none;border-radius:0;box-shadow:none!important}
.mshape.star{clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);border:none;border-radius:0}
.popup{position:absolute;left:26px;top:-8px;background:rgba(8,4,1,0.97);border-radius:8px;padding:10px 13px;min-width:200px;box-shadow:0 4px 24px rgba(0,0,0,0.95);z-index:20;border:1px solid #5a3e1e}
.pname{color:#c8a84b;font-size:14px;margin-bottom:8px;display:flex;align-items:center;gap:7px}
.pdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.frow{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #2a1a08}
.frow:last-of-type{border-bottom:none;margin-bottom:6px}
.fname{color:#c8a84b;font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fview{color:#60a5fa;font-size:13px;flex-shrink:0;text-decoration:underline;padding:8px 10px;margin:-6px}
.pbtns{display:flex;gap:6px}
.pbtn{flex:1;padding:8px 6px;border-radius:6px;font-size:12px;font-family:Georgia,serif;border:1px solid #5a3e1e;background:rgba(30,18,6,0.9);color:#d4b896;text-align:center}
.pbtn.e{border-color:#c8a84b;color:#f0d890}
.pbtn.d{border-color:#7a2020;color:#f0a0a0;background:rgba(60,8,8,0.8)}
#toolbar{position:fixed;bottom:0;left:0;right:0;display:flex;align-items:center;padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:rgba(8,4,1,0.92);border-top:1px solid #3a2610;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:100;gap:8px}
.tbtn{flex:1;background:rgba(30,18,6,0.9);border:1px solid #5a3e1e;color:#d4b896;padding:10px 6px;border-radius:8px;font-size:12px;font-family:Georgia,serif;text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.tbtn .ic{font-size:18px}
.tbtn.on{border-color:#c8a84b;color:#f0d890;background:rgba(80,50,10,0.9)}
#zbtns{position:fixed;right:14px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:8px;z-index:100}
.zbtn{width:44px;height:44px;background:rgba(8,4,1,0.88);border:1px solid #5a3e1e;color:#d4b896;border-radius:8px;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200}
.overlay.show{display:block}
.sheet{position:fixed;bottom:0;left:0;right:0;background:#0e0804;border-top:1px solid #5a3e1e;border-radius:16px 16px 0 0;padding:16px 20px calc(24px + env(safe-area-inset-bottom));z-index:201;transform:translateY(100%);transition:transform 0.3s ease;max-height:85vh;overflow-y:auto}
.overlay.show .sheet{transform:translateY(0)}
.handle{width:36px;height:4px;background:#5a3e1e;border-radius:2px;margin:0 auto 14px}
.stitle{font-size:11px;color:#6a4e20;letter-spacing:2px;margin-bottom:14px}
.flabel{font-size:11px;color:#6a4e20;letter-spacing:1px;margin-bottom:5px}
.finput{background:rgba(4,2,0,0.95);border:1px solid #5a3e1e;color:#d4b896;padding:10px 12px;border-radius:8px;font-family:Georgia,serif;font-size:16px;width:100%;margin-bottom:14px}
.finput:focus{outline:none;border-color:#c8a84b}
.finput::placeholder{color:#4a3010}
.swatches{display:flex;gap:12px;margin-bottom:16px;justify-content:center;flex-wrap:wrap}
.sw{width:32px;height:32px;border-radius:50%;border:2.5px solid rgba(0,0,0,0.4);cursor:pointer}
.sw.on{border:3px solid #fff;box-shadow:0 0 6px #fff8}
.sbtns{display:flex;gap:10px}
.sbtn{flex:1;padding:12px;border-radius:8px;font-family:Georgia,serif;font-size:15px;border:1px solid #5a3e1e;background:rgba(15,9,3,0.88);color:#d4b896;cursor:pointer}
.sbtn.p{background:rgba(80,50,10,0.9);border-color:#c8a84b;color:#f0d890}
.azone{border:1px dashed #5a3e1e;border-radius:8px;padding:14px;text-align:center;margin-bottom:14px;color:#6a4e20;font-size:13px;cursor:pointer;display:block}
.aitem{display:flex;align-items:center;background:rgba(20,12,4,0.8);border:1px solid #3a2610;border-radius:6px;padding:8px 10px;margin-bottom:6px}
.ainame{color:#c8a84b;font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px}
.aivw{color:#60a5fa;font-size:12px;cursor:pointer;text-decoration:underline;padding:8px;flex-shrink:0}
.aidl{color:#f0a0a0;font-size:16px;cursor:pointer;padding:8px;flex-shrink:0}
#viewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.97);z-index:1000;flex-direction:column}
#viewer.show{display:flex}
#vhead{display:flex;align-items:center;justify-content:space-between;padding:calc(14px + env(safe-area-inset-top)) 16px 14px;background:rgba(8,4,1,0.9);border-bottom:1px solid #3a2610;flex-shrink:0}
#vtitle{color:#c8a84b;font-size:14px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:10px}
#vclose{color:#d4b896;font-size:24px;background:rgba(30,18,6,0.9);border:1px solid #5a3e1e;padding:6px 14px;border-radius:8px;cursor:pointer;font-family:Georgia,serif}
#vbody{flex:1;overflow:hidden;position:relative;touch-action:none}
#vbody img{position:absolute;top:50%;left:50%;transform-origin:center center;border-radius:4px;max-width:none;cursor:grab}
#vpdf{flex:1;overflow:auto;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:16px}
.vbtn{background:rgba(80,50,10,0.9);border:1px solid #c8a84b;color:#f0d890;padding:14px 28px;border-radius:8px;font-family:Georgia,serif;font-size:15px;text-decoration:none;text-align:center;display:inline-block}
.vnote{color:#6a4e20;font-size:11px;text-align:center;max-width:280px;line-height:1.6}
#toast{position:fixed;bottom:calc(90px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:rgba(10,6,2,0.95);border:1px solid #5a3e1e;color:#c8a84b;padding:8px 18px;border-radius:20px;font-size:12px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:2000;white-space:nowrap}
#toast.show{opacity:1}
</style>
</head>

<script>
var COLORS=["#4ade80","#facc15","#fb923c","#f87171","#60a5fa","#c084fc","#f8fafc"];
var SHAPES=[{id:'circle',label:'●'},{id:'square',label:'■'},{id:'triangle',label:'▲'},{id:'star',label:'★'}];
var scale=1,ox=0,oy=0,imgW=1000,imgH=1000;
var adding=false,markers=[],selectedId=null;
var addColor=COLORS[0],editColor=COLORS[0],addShape='circle',editShape='circle',editingId=null;
var pendingPx=0,pendingPy=0;
var container=document.getElementById('container');
var mapLayer=document.getElementById('map-layer');
var mlayer=document.getElementById('mlayer');
var mapImg=document.getElementById('map-img');

function applyT(){mapLayer.style.transform='translate('+ox+'px,'+oy+'px) scale('+scale+')';}
function doZoom(f,cx,cy){
  var n=Math.min(8,Math.max(0.2,scale*f)),r=n/scale;
  ox=cx-(cx-ox)*r;oy=cy-(cy-oy)*r;scale=n;applyT();
}
function initView(){
  var cw=container.clientWidth,ch=container.clientHeight;
  scale=Math.min(cw/imgW,ch/imgH);
  ox=(cw-imgW*scale)/2;oy=(ch-imgH*scale)/2;applyT();
}

mapImg.onload=function(){
  imgW=mapImg.naturalWidth;imgH=mapImg.naturalHeight;
  mapImg.style.width=imgW+'px';mapImg.style.height=imgH+'px';
  initView();loadMarkers();
};
if(mapImg.complete&&mapImg.naturalWidth>0){mapImg.onload();}

function loadMarkers(){
  try{var s=localStorage.getItem('drk_m');if(s){markers=JSON.parse(s);markers.forEach(function(m){if(!m.files)m.files=[];});}}catch(e){}
  render();
}
function save(){try{localStorage.setItem('drk_m',JSON.stringify(markers));}catch(e){}}

// Touch
var pts={},lastDist=null,panOx=0,panOy=0,t0x=0,t0y=0,moved=false;
container.addEventListener('touchstart',function(e){
  e.preventDefault();moved=false;
  for(var i=0;i<e.touches.length;i++){var t=e.touches[i];pts[t.identifier]={x:t.clientX,y:t.clientY};}
  var k=Object.keys(pts);
  if(k.length===1){t0x=e.touches[0].clientX;t0y=e.touches[0].clientY;panOx=ox;panOy=oy;}
  if(k.length===2){var v=Object.values(pts);lastDist=Math.hypot(v[1].x-v[0].x,v[1].y-v[0].y);}
},{passive:false});

container.addEventListener('touchmove',function(e){
  e.preventDefault();
  for(var i=0;i<e.touches.length;i++){var t=e.touches[i];pts[t.identifier]={x:t.clientX,y:t.clientY};}
  var k=Object.keys(pts);
  if(k.length===1&&!adding){
    var dx=e.touches[0].clientX-t0x,dy=e.touches[0].clientY-t0y;
    if(Math.abs(dx)>4||Math.abs(dy)>4)moved=true;
    ox=panOx+dx;oy=panOy+dy;applyT();
  }
  if(k.length===2){
    moved=true;
    var v=Object.values(pts),d=Math.hypot(v[1].x-v[0].x,v[1].y-v[0].y);
    var r=container.getBoundingClientRect();
    var mx=(v[0].x+v[1].x)/2-r.left,my=(v[0].y+v[1].y)/2-r.top;
    if(lastDist)doZoom(d/lastDist,mx,my);
    lastDist=d;
  }
},{passive:false});

container.addEventListener('touchend',function(e){
  for(var i=0;i<e.changedTouches.length;i++)delete pts[e.changedTouches[i].identifier];
  lastDist=null;
  if(moved||e.changedTouches.length!==1)return;
  var t=e.changedTouches[0],r=container.getBoundingClientRect();
  var ix=(t.clientX-r.left-ox)/scale,iy=(t.clientY-r.top-oy)/scale;
  // Le marqueur fait 22px image → rayon visuel = 11px image = 11*scale px écran
  // On prend le max entre la taille réelle du marqueur et 20px écran minimum
  var hr=Math.max(11, 20/scale);
  var hit=null;
  for(var i=0;i<markers.length;i++){var m=markers[i];if(Math.abs(m.px-ix)<hr&&Math.abs(m.py-iy)<hr){hit=m;break;}}
  if(hit){selectedId=(selectedId===hit.id)?null:hit.id;render();return;}
  if(selectedId){selectedId=null;render();return;}
  if(adding){pendingPx=ix;pendingPy=iy;showAdd();}
},{passive:false});

// Zoom buttons
function zbind(id,fn){
  var el=document.getElementById(id);
  function go(e){e.preventDefault();e.stopPropagation();var r=container.getBoundingClientRect();fn(r.width/2,r.height/2);}
  el.addEventListener('touchend',go,{passive:false});
  el.addEventListener('click',go);
}
zbind('bzin',function(cx,cy){doZoom(1.3,cx,cy);});
zbind('bzout',function(cx,cy){doZoom(0.75,cx,cy);});
zbind('bzrst',function(){initView();});

// Add mode
function toggleAdd(){
  adding=!adding;
  document.getElementById('badd').classList.toggle('on',adding);
  document.getElementById('baddlbl').textContent=adding?'Annuler':'Marqueur';
}
tapBind('badd',toggleAdd);

// Swatches
function buildSw(id,getC,setC){
  var el=document.getElementById(id);el.innerHTML='';
  COLORS.forEach(function(hex){
    var s=document.createElement('div');s.className='sw'+(hex===getC()?' on':'');s.style.background=hex;
    tapBind2(s,function(){setC(hex);el.querySelectorAll('.sw').forEach(function(x){x.classList.remove('on');});s.classList.add('on');});
    el.appendChild(s);
  });
}

// Add sheet
function buildShapes(id,getS,setS){
  var el=document.getElementById(id);if(!el)return;el.innerHTML='';
  SHAPES.forEach(function(sh){
    var s=document.createElement('div');
    s.style.cssText='display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:6px;cursor:pointer;border:2px solid '+(sh.id===getS()?'#c8a84b':'#3a2610')+';background:'+(sh.id===getS()?'rgba(80,50,10,0.9)':'rgba(20,10,4,0.8)')+';font-size:18px;color:#d4b896;';
    s.textContent=sh.label;
    tapBind2(s,function(){
      setS(sh.id);
      el.querySelectorAll('div').forEach(function(x){x.style.borderColor='#3a2610';x.style.background='rgba(20,10,4,0.8)';});
      s.style.borderColor='#c8a84b';s.style.background='rgba(80,50,10,0.9)';
    });
    el.appendChild(s);
  });
}
function showAdd(){
  buildSw('asw',function(){return addColor;},function(v){addColor=v;});
  buildShapes('ashapes',function(){return addShape;},function(v){addShape=v;});
  document.getElementById('ainput').value='';
  document.getElementById('oadd').classList.add('show');
  setTimeout(function(){document.getElementById('ainput').focus();},350);
}
function hideAdd(){document.getElementById('oadd').classList.remove('show');}
tapBind('baconf',function(){
  var lbl=document.getElementById('ainput').value.trim();if(!lbl)return;
  markers.push({id:Date.now(),px:pendingPx,py:pendingPy,color:addColor,shape:addShape,label:lbl,files:[]});
  save();render();hideAdd();if(adding)toggleAdd();toast('Marqueur ajouté ✓');
});
tapBind('bacanc',function(){hideAdd();if(adding)toggleAdd();});
document.getElementById('oadd').addEventListener('touchend',function(e){if(e.target===this){hideAdd();if(adding)toggleAdd();}},{passive:false});

// Edit sheet
function showEdit(id){
  var m=null;for(var i=0;i<markers.length;i++){if(markers[i].id===id){m=markers[i];break;}}if(!m)return;
  editingId=id;editColor=m.color;editShape=m.shape||'circle';
  document.getElementById('einput').value=m.label;
  buildSw('esw',function(){return editColor;},function(v){editColor=v;});
  buildShapes('eshapes',function(){return editShape;},function(v){editShape=v;});
  renderAlist(m);
  document.getElementById('oedit').classList.add('show');
  setTimeout(function(){document.getElementById('einput').focus();},350);
}
function hideEdit(){document.getElementById('oedit').classList.remove('show');editingId=null;}
tapBind('besave',function(){
  var lbl=document.getElementById('einput').value.trim();if(!lbl)return;
  markers=markers.map(function(m){return m.id===editingId?Object.assign({},m,{label:lbl,color:editColor,shape:editShape}):m;});
  save();render();hideEdit();toast('Modifié ✓');
});
tapBind('becanc',hideEdit);
document.getElementById('oedit').addEventListener('touchend',function(e){if(e.target===this)hideEdit();},{passive:false});

// Attach
document.getElementById('fattach').addEventListener('change',function(e){
  var file=e.target.files[0];if(!file)return;
  var rd=new FileReader();
  rd.onload=function(ev){
    var m=null;for(var i=0;i<markers.length;i++){if(markers[i].id===editingId){m=markers[i];break;}}if(!m)return;
    m.files.push({name:file.name,type:file.type,data:ev.target.result});
    save();renderAlist(m);toast('Fichier ajouté ✓');
  };
  rd.readAsDataURL(file);e.target.value='';
});

function renderAlist(m){
  var el=document.getElementById('alist');el.innerHTML='';
  (m.files||[]).forEach(function(f,i){
    var row=document.createElement('div');row.className='aitem';
    var icon=f.type.indexOf('image')>=0?'🖼':'📄';
    var nm=document.createElement('span');nm.className='ainame';nm.textContent=icon+' '+f.name;
    var vw=document.createElement('span');vw.className='aivw';vw.textContent='Voir';
    var dl=document.createElement('span');dl.className='aidl';dl.textContent='✕';
    var fi=f;var idx=i;
    tapBind2(vw,function(){openViewer(fi);});
    tapBind2(dl,function(){m.files.splice(idx,1);save();renderAlist(m);});
    row.appendChild(nm);row.appendChild(vw);row.appendChild(dl);el.appendChild(row);
  });
}

// Viewer
function openViewer(f){
  document.getElementById('vtitle').textContent=f.name;
  var vb=document.getElementById('vbody');vb.innerHTML='';
  if(f.type.indexOf('image')>=0){
    var img=document.createElement('img');
    img.src=f.data;
    img.style.cssText='top:50%;left:50%;max-width:none;';
    vb.appendChild(img);
    // Calcule le scale initial pour que l'image tienne dans l'écran
    var vs=1,vox=0,voy=0,vpts={},vlast=null,vpox=0,vpoy=0,vt0x=0,vt0y=0,vmoved=false;
    function applyVI(){img.style.transform='translate(calc(-50% + '+vox+'px), calc(-50% + '+voy+'px)) scale('+vs+')';}
    function initVI(){
      var vbw=vb.clientWidth,vbh=vb.clientHeight;
      var iw=img.naturalWidth||img.width||vbw;
      var ih=img.naturalHeight||img.height||vbh;
      vs=Math.min(vbw/iw, vbh/ih, 1); // jamais > 1x au départ
      vox=0;voy=0;applyVI();
    }
    if(img.complete&&img.naturalWidth>0){initVI();}else{img.onload=initVI;}
    vb.addEventListener('touchstart',function(e){
      e.preventDefault();vmoved=false;
      Array.from(e.touches).forEach(function(t){vpts[t.identifier]={x:t.clientX,y:t.clientY};});
      var k=Object.keys(vpts);
      if(k.length===1){vt0x=e.touches[0].clientX;vt0y=e.touches[0].clientY;vpox=vox;vpoy=voy;}
      if(k.length===2){var v=Object.values(vpts);vlast=Math.hypot(v[1].x-v[0].x,v[1].y-v[0].y);}
    },{passive:false});
    vb.addEventListener('touchmove',function(e){
      e.preventDefault();
      Array.from(e.touches).forEach(function(t){vpts[t.identifier]={x:t.clientX,y:t.clientY};});
      var k=Object.keys(vpts);
      if(k.length===1){
        var dx=e.touches[0].clientX-vt0x,dy=e.touches[0].clientY-vt0y;
        if(Math.abs(dx)>3||Math.abs(dy)>3)vmoved=true;
        vox=vpox+dx;voy=vpoy+dy;applyVI();
      }
      if(k.length===2){
        vmoved=true;
        var v=Object.values(vpts);
        var d=Math.hypot(v[1].x-v[0].x,v[1].y-v[0].y);
        if(vlast){vs=Math.min(10,Math.max(0.05,vs*d/vlast));}
        vlast=d;applyVI();
      }
    },{passive:false});
    vb.addEventListener('touchend',function(e){
      Array.from(e.changedTouches).forEach(function(t){delete vpts[t.identifier];});
      vlast=null;
      // Double-tap reset
      if(!vmoved&&e.changedTouches.length===1){
        var now=Date.now();
        if(vb._lastTap&&now-vb._lastTap<300){vs=1;vox=0;voy=0;applyVI();}
        vb._lastTap=now;
      }
    },{passive:false});
  } else {
    var wrap=document.createElement('div');wrap.id='vpdf';
    var a1=document.createElement('a');a1.href=f.data;a1.target='_blank';a1.className='vbtn';a1.textContent='📄 Ouvrir le PDF';
    var note=document.createElement('div');note.className='vnote';note.textContent='Appuyez sur le bouton ci-dessus pour lire le PDF dans Safari.';
    wrap.appendChild(a1);wrap.appendChild(note);vb.appendChild(wrap);
    vb.style.overflow='auto';vb.style.display='flex';vb.style.alignItems='center';vb.style.justifyContent='center';
  }
  document.getElementById('viewer').classList.add('show');
  // Autoriser le pinch-zoom natif dans la visionneuse
  document.getElementById('vpmeta').content='width=device-width, initial-scale=1.0';
}
tapBind('vclose',function(){
  var vb=document.getElementById('vbody');
  vb.innerHTML='';vb.style.overflow='';vb.style.display='';vb.style.alignItems='';vb.style.justifyContent='';
  document.getElementById('viewer').classList.remove('show');
  // Restaurer la restriction zoom pour la carte
  document.getElementById('vpmeta').content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no';
});

// Render markers
function render(){
  mlayer.innerHTML='';
  markers.forEach(function(m){
    var el=document.createElement('div');
    el.className='marker'+(m.id===selectedId?' sel':'');
    var sh=m.shape||'circle';
    el.style.cssText='left:'+m.px+'px;top:'+m.py+'px;';
    var shape=document.createElement('div');
    shape.className='mshape '+sh;
    if(sh==='triangle'){
      shape.style.cssText='border-bottom-color:'+m.color+';filter:drop-shadow(0 0 4px '+m.color+'99)';
    } else {
      shape.style.cssText='background:'+m.color+';box-shadow:0 0 8px '+m.color+'99,0 2px 6px rgba(0,0,0,0.9)';
    }
    el.appendChild(shape);
    if(m.files&&m.files.length){
      var b=document.createElement('div');
      b.style.cssText='position:absolute;top:-6px;right:-6px;background:#c8a84b;color:#000;border-radius:50%;width:14px;height:14px;font-size:9px;display:flex;align-items:center;justify-content:center;font-family:sans-serif;font-weight:bold;pointer-events:none';
      b.textContent=m.files.length;el.appendChild(b);
    }
    if(m.id===selectedId){
      var pop=document.createElement('div');pop.className='popup';
      var nm=document.createElement('div');nm.className='pname';
      nm.innerHTML='<div class="pdot" style="background:'+m.color+'"></div>'+escHtml(m.label);
      pop.appendChild(nm);
      (m.files||[]).forEach(function(f){
        var row=document.createElement('div');row.className='frow';
        var icon=f.type.indexOf('image')>=0?'🖼':'📄';
        var fn=document.createElement('span');fn.className='fname';fn.textContent=icon+' '+f.name;
        var fv=document.createElement('span');fv.className='fview';fv.textContent='Voir';
        var fi=f;tapBind2(fv,function(){openViewer(fi);});
        row.appendChild(fn);row.appendChild(fv);pop.appendChild(row);
      });
      var btns=document.createElement('div');btns.className='pbtns';
      var eb=document.createElement('div');eb.className='pbtn e';eb.textContent='✏️ Modifier';
      var db=document.createElement('div');db.className='pbtn d';db.textContent='🗑 Supprimer';
      var mid=m.id;
      tapBind2(eb,function(){selectedId=null;render();showEdit(mid);});
      tapBind2(db,function(){markers=markers.filter(function(x){return x.id!==mid;});selectedId=null;save();render();});
      btns.appendChild(eb);btns.appendChild(db);pop.appendChild(btns);
      pop.addEventListener('touchstart',function(e){e.stopPropagation();},{passive:false});
      pop.addEventListener('touchend',function(e){e.stopPropagation();},{passive:false});
      el.appendChild(pop);
    }
    el.addEventListener('touchstart',function(e){e.stopPropagation();},{passive:false});
    el.addEventListener('touchend',function(e){
      e.stopPropagation();
      e.preventDefault();
      if(e.changedTouches.length!==1)return;
      var mid2=m.id;
      selectedId=(selectedId===mid2)?null:mid2;
      render();
    },{passive:false});
    mlayer.appendChild(el);
  });
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Export / Import
tapBind('bexp',function(){
  var blob=new Blob([JSON.stringify(markers,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='drakkenheim_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(url);toast('Exporté ✓');
});
document.getElementById('fimp').addEventListener('change',function(e){
  var file=e.target.files[0];if(!file)return;
  var rd=new FileReader();
  rd.onload=function(ev){
    try{var d=JSON.parse(ev.target.result);if(Array.isArray(d)){markers=d.map(function(m){return Object.assign({files:[]},m);});selectedId=null;save();render();toast(markers.length+' marqueur(s) ✓');}}catch(err){alert('Fichier invalide.');}
  };
  rd.readAsText(file);e.target.value='';
});

// Toast
var toastT;
function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){el.classList.remove('show');},2200);}

// Helpers
function tapBind(id,fn){
  var el=document.getElementById(id);
  el.addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();fn();},{passive:false});
  el.addEventListener('click',function(e){e.stopPropagation();fn();});
}
function tapBind2(el,fn){
  el.addEventListener('touchstart',function(e){e.stopPropagation();},{passive:false});
  el.addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();fn();},{passive:false});
  el.addEventListener('click',function(e){e.stopPropagation();fn();});
}
</script>
